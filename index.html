<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      margin: 0;
      background: #f1f5f9;
      color: #0f172a;
    }
    .header {
      background: linear-gradient(135deg, #1e40af, #2563eb);
      color: #fff;
      padding: 16px 20px;
    }
    .header h1 { margin: 0 0 4px; font-size: 20px; }
    .header p { margin: 0; font-size: 12px; opacity: 0.9; }
    .main {
      display: flex;
      gap: 12px;
      padding: 12px 16px 16px;
      max-width: 1800px;
      margin: 0 auto;
      align-items: flex-start;
      min-height: calc(100vh - 72px);
    }
    .left-panel {
      flex: 0 0 560px;
      min-width: 480px;
      max-width: 620px;
      overflow: hidden;
    }
    .right-panel {
      flex: 1 1 400px;
      min-width: 320px;
      position: sticky;
      top: 12px;
      align-self: flex-start;
      max-height: calc(100vh - 72px);
      display: flex;
      flex-direction: column;
    }
    .right-panel .card {
      margin-bottom: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .card {
      background: #fff;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #1e40af;
    }
    .search-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
    }
    .field { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .field.full { grid-column: 1 / -1; }
    .field label {
      font-size: 12px;
      font-weight: bold;
      color: #475569;
    }
    .field input, .field select {
      width: 100%;
      min-width: 0;
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
    }
    .scope-group {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 28px;
      flex-wrap: nowrap;
    }
    .scope-group label {
      font-size: 14px;
      font-weight: normal;
      display: inline-flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      white-space: nowrap;
      flex: 0 0 auto;
      width: auto;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-secondary { background: #e2e8f0; color: #334155; }
    .btn-action { background: #0f766e; color: #fff; }
    .hint {
      font-size: 11px;
      color: #64748b;
      margin-top: 8px;
      line-height: 1.5;
    }
    .result-meta {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 8px;
    }
    .result-table-wrap {
      max-height: 480px;
      overflow: auto;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      border-bottom: 1px solid #e2e8f0;
      padding: 8px 6px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f8fafc;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tr.result-row { cursor: pointer; }
    tr.result-row:hover { background: #eff6ff; }
    tr.result-row.active { background: #dbeafe; }
    .file-link {
      color: #1d4ed8;
      font-weight: bold;
      word-break: break-all;
    }
    .preview-box {
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #f8fafc;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .preview-head {
      padding: 8px 10px;
      border-bottom: 1px solid #e2e8f0;
      font-size: 12px;
      font-weight: bold;
      color: #334155;
      word-break: break-all;
    }
    .preview-frame-wrap {
      flex: 1;
      height: calc(100vh - 155px);
      min-height: 620px;
      max-height: calc(100vh - 120px);
      overflow: auto;
      background: #525659;
    }
    .preview-frame-wrap canvas.pdf-page {
      display: block;
      margin: 6px auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      background: #fff;
    }
    .preview-frame-wrap iframe,
    .preview-frame-wrap embed {
      display: none;
    }
    .preview-empty {
      padding: 40px 16px;
      text-align: center;
      color: #64748b;
      font-size: 13px;
    }
    .preview-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid #e2e8f0;
      background: #fff;
    }
    @media (max-width: 960px) {
      .main { flex-direction: column; }
      .left-panel { flex: 1 1 auto; max-width: none; }
      .right-panel {
        position: static;
        max-height: none;
        width: 100%;
      }
      .preview-frame-wrap { max-height: 70vh; }
    }
    #loading {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="loading">検索中...</div>

  <div class="header">
    <h1>検査成績書検索</h1>
    <p>Drive上の検査成績書（製品コード / ロットNo / 製造日）を検索・閲覧</p>
  </div>

  <div class="main">
    <div class="left-panel">
      <div class="card">
        <h2>検索条件</h2>
        <div class="search-grid">
          <div class="field full">
            <label>検索対象</label>
            <div class="scope-group" id="scopeGroup">
              <label><input type="radio" name="scope" value="external" checked> 社外</label>
              <label><input type="radio" name="scope" value="internal"> 社内</label>
            </div>
          </div>
          <div class="field">
            <label for="productCode">製品コード</label>
            <input type="text" id="productCode" placeholder="部分一致">
          </div>
          <div class="field">
            <label for="lotNo">ロットNo</label>
            <input type="text" id="lotNo" placeholder="部分一致">
          </div>
          <div class="field full">
            <label for="mfgDate">製造日</label>
            <input type="text" id="mfgDate" placeholder="例: 20260501～20260530">
          </div>
        </div>
        <div class="btn-row">
          <button type="button" class="btn btn-primary" onclick="runSearch()">検索</button>
          <button type="button" class="btn btn-secondary" onclick="clearForm()">クリア</button>
        </div>
        <div class="hint">
          製造日は「20260501～20260530」のように範囲指定できます。すべて空欄でも検索できます。
        </div>
      </div>

      <div class="card">
        <h2>検索結果</h2>
        <div class="result-meta" id="resultMeta">検索してください</div>
        <div class="result-table-wrap">
          <table>
            <thead>
              <tr>
                <th>ファイル名</th>
                <th>製品コード</th>
                <th>ロットNo</th>
                <th>製造日</th>
                <th>更新</th>
              </tr>
            </thead>
            <tbody id="resultBody">
              <tr><td colspan="5" style="color:#64748b;">—</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="card">
        <h2>PDFプレビュー</h2>
        <div class="preview-box">
          <div class="preview-head" id="previewTitle">ファイルを選択してください</div>
          <div class="preview-frame-wrap" id="previewWrap">
            <div class="preview-empty" id="previewEmpty">一覧からファイル名をクリックするとここに表示されます</div>
            <div id="pdfCanvasHost"></div>
          </div>
          <div class="preview-actions">
            <button type="button" class="btn btn-action" id="btnDownload" onclick="downloadPdf()" disabled>ダウンロード</button>
            <button type="button" class="btn btn-secondary" id="btnPrint" onclick="printPdf()" disabled>印刷</button>
            <button type="button" class="btn btn-secondary" id="btnOpenTab" onclick="openPdfInNewTab()" disabled>新しいタブで開く</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (window['pdfjsLib']) {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    let appData = { appBaseUrl: '', maxResults: 200, chunkSize: 524288, chunkBatchMax: 4 };
    let searchResults = [];
    let selectedItem = null;
    let previewPayload = null;
    let previewBlobUrl = null;
    let pdfBufferData = null;
    let pdfRenderToken = 0;
    let pdfResizeTimer = null;
    let pdfLoadCache = {};

    window.onload = function() {
      document.getElementById('loading').style.display = 'flex';
      google.script.run
        .withSuccessHandler(function(data) {
          appData = data || {};
          document.getElementById('loading').style.display = 'none';
        })
        .withFailureHandler(function(err) {
          document.getElementById('loading').style.display = 'none';
          alert('初期化エラー: ' + err.message);
        })
        .getPdfAppInitialData();
    };

    function getSelectedScope() {
      const checked = document.querySelector('input[name="scope"]:checked');
      return checked ? checked.value : 'external';
    }

    function getSearchPayload() {
      return {
        scope: getSelectedScope(),
        productCode: document.getElementById('productCode').value,
        lotNo: document.getElementById('lotNo').value,
        mfgDate: document.getElementById('mfgDate').value
      };
    }

    function runSearch() {
      document.getElementById('loading').style.display = 'flex';
      google.script.run
        .withSuccessHandler(function(result) {
          document.getElementById('loading').style.display = 'none';
          renderResults(result || {});
        })
        .withFailureHandler(function(err) {
          document.getElementById('loading').style.display = 'none';
          alert('検索エラー: ' + err.message);
        })
        .searchProductPdfs(getSearchPayload());
    }

    function clearForm() {
      document.getElementById('productCode').value = '';
      document.getElementById('lotNo').value = '';
      document.getElementById('mfgDate').value = '';
      document.querySelector('input[name="scope"][value="external"]').checked = true;
    }

    function renderResults(result) {
      searchResults = result.items || [];
      selectedItem = null;
      updatePreview(null);

      let meta = (result.scopeLabel || '') + ' — ' + (result.count || 0) + '件';
      if (result.truncated) {
        meta += '（上限' + (result.maxResults || appData.maxResults || 200) + '件。条件を絞り込んでください）';
      }
      document.getElementById('resultMeta').innerText = meta;

      const tbody = document.getElementById('resultBody');
      tbody.innerHTML = '';
      if (!searchResults.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="color:#64748b;">該当なし</td></tr>';
        return;
      }

      searchResults.forEach(function(item, idx) {
        const tr = document.createElement('tr');
        tr.className = 'result-row';
        tr.dataset.index = String(idx);
        tr.innerHTML =
          '<td><span class="file-link">' + escapeHtml(item.fileName) + '</span></td>'
          + '<td>' + escapeHtml(item.productCode) + '</td>'
          + '<td>' + escapeHtml(item.lotNo) + '</td>'
          + '<td>' + escapeHtml(item.mfgDate) + '</td>'
          + '<td>' + escapeHtml(item.updatedAt) + '</td>';
        tr.onclick = function() { selectItem(idx); };
        tbody.appendChild(tr);
      });
    }

    function selectItem(index) {
      selectedItem = searchResults[index] || null;
      document.querySelectorAll('.result-row').forEach(function(row) {
        row.classList.toggle('active', Number(row.dataset.index) === index);
      });
      updatePreview(selectedItem);
    }

    function buildContentUrl(item, mode) {
      if (!item) return '';
      const base = getAppBaseUrl_();
      if (!base || !item.fileId) return '';
      const page = mode === 'download' ? 'download' : 'view';
      return base + (base.indexOf('?') >= 0 ? '&' : '?') + 'page=' + page + '&fileId=' + encodeURIComponent(item.fileId);
    }

    function getAppBaseUrl_() {
      if (appData.appBaseUrl) return appData.appBaseUrl;
      return window.location.href.split('?')[0].split('#')[0];
    }

    function gasRunGetPdfFileMeta_(fileId) {
      return new Promise(function(resolve, reject) {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          .getPdfFileMeta(fileId);
      });
    }

    function gasRunGetPdfBytesChunks_(payload) {
      return new Promise(function(resolve, reject) {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          .getPdfBytesChunks(payload);
      });
    }

    function runPool_(items, concurrency, worker) {
      return new Promise(function(resolve, reject) {
        let index = 0;
        let active = 0;
        let failed = false;

        function next() {
          if (failed) return;
          if (index >= items.length && active === 0) {
            resolve();
            return;
          }
          while (active < concurrency && index < items.length) {
            const item = items[index++];
            active++;
            worker(item).then(function() {
              active--;
              next();
            }).catch(function(err) {
              failed = true;
              reject(err);
            });
          }
        }
        next();
      });
    }

    function loadPdfViaChunks_(fileId, onProgress) {
      const cached = pdfLoadCache[fileId];
      if (cached) {
        if (onProgress) onProgress(100);
        return Promise.resolve(cached);
      }

      return gasRunGetPdfFileMeta_(fileId).then(function(meta) {
        const total = meta.size;
        const chunkSize = meta.chunkSize || appData.chunkSize || 524288;
        const batchMax = appData.chunkBatchMax || 4;
        const buffer = new Uint8Array(total);
        const offsets = [];
        for (let o = 0; o < total; o += chunkSize) offsets.push(o);

        const batches = [];
        for (let i = 0; i < offsets.length; i += batchMax) {
          batches.push(offsets.slice(i, i + batchMax));
        }

        let loadedBytes = 0;

        return runPool_(batches, 3, function(batchOffsets) {
          return gasRunGetPdfBytesChunks_({ fileId: fileId, offsets: batchOffsets })
            .then(function(result) {
              (result.chunks || []).forEach(function(chunk) {
                const bytes = bytesFromBase64_(chunk.base64);
                buffer.set(bytes, chunk.offset);
                loadedBytes += chunk.length;
              });
              if (onProgress) {
                onProgress(Math.min(100, Math.round(loadedBytes / total * 100)));
              }
            });
        }).then(function() {
          const payload = { meta: meta, buffer: buffer };
          pdfLoadCache[fileId] = payload;
          return payload;
        });
      });
    }

    function revokePreviewBlob_() {
      if (previewBlobUrl) {
        URL.revokeObjectURL(previewBlobUrl);
        previewBlobUrl = null;
      }
    }

    function bytesFromBase64_(base64) {
      const binary = atob(base64);
      const len = binary.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    function setPreviewButtonsEnabled_(enabled) {
      document.getElementById('btnDownload').disabled = !enabled;
      document.getElementById('btnPrint').disabled = !enabled;
      document.getElementById('btnOpenTab').disabled = !enabled;
    }

    function getPreviewContainerSize_() {
      const el = document.getElementById('previewWrap');
      return {
        width: Math.max(80, el.clientWidth - 12),
        height: Math.max(80, el.clientHeight - 12)
      };
    }

    function calcFitPageScale_(page, containerSize) {
      const base = page.getViewport({ scale: 1 });
      const scaleW = containerSize.width / base.width;
      const scaleH = containerSize.height / base.height;
      return Math.max(0.1, Math.min(scaleW, scaleH));
    }

    function renderPdfToHost_(data, hostEl, containerSize) {
      if (!window['pdfjsLib']) {
        return renderPdfEmbedFallback_(hostEl);
      }

      hostEl.innerHTML = '';
      const token = ++pdfRenderToken;
      const pdfData = data.slice ? data.slice() : new Uint8Array(data);

      function renderOnePage_(pdf, pageNum, sharedScale) {
        if (token !== pdfRenderToken) return Promise.resolve();
        return pdf.getPage(pageNum).then(function(page) {
          if (token !== pdfRenderToken) return;

          const viewport = page.getViewport({ scale: sharedScale });
          const canvas = document.createElement('canvas');
          canvas.className = 'pdf-page';
          const ctx = canvas.getContext('2d');
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          canvas.width = Math.floor(viewport.width * dpr);
          canvas.height = Math.floor(viewport.height * dpr);
          canvas.style.width = viewport.width + 'px';
          canvas.style.height = viewport.height + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          hostEl.appendChild(canvas);

          return page.render({ canvasContext: ctx, viewport: viewport }).promise;
        });
      }

      return pdfjsLib.getDocument({ data: pdfData }).promise.then(function(pdf) {
        if (token !== pdfRenderToken) return;

        return pdf.getPage(1).then(function(firstPage) {
          if (token !== pdfRenderToken) return;
          const sharedScale = calcFitPageScale_(firstPage, containerSize);

          return renderOnePage_(pdf, 1, sharedScale).then(function() {
            if (token !== pdfRenderToken || pdf.numPages <= 1) return;
            const rest = [];
            for (let pageNum = 2; pageNum <= pdf.numPages; pageNum++) {
              rest.push(renderOnePage_(pdf, pageNum, sharedScale));
            }
            return Promise.all(rest);
          });
        });
      });
    }

    function rerenderPdfPreview_() {
      if (!pdfBufferData) return Promise.resolve();
      const size = getPreviewContainerSize_();
      return renderPdfToHost_(pdfBufferData, document.getElementById('pdfCanvasHost'), size);
    }

    function clearPdfCanvas_() {
      document.getElementById('pdfCanvasHost').innerHTML = '';
    }

    function renderPdfFromArrayBuffer_(data) {
      pdfBufferData = data.slice ? data.slice() : new Uint8Array(data);
      return new Promise(function(resolve, reject) {
        requestAnimationFrame(function() {
          const size = getPreviewContainerSize_();
          renderPdfToHost_(pdfBufferData, document.getElementById('pdfCanvasHost'), size)
            .then(resolve)
            .catch(reject);
        });
      });
    }

    function renderPdfEmbedFallback_(hostEl) {
      hostEl = hostEl || document.getElementById('pdfCanvasHost');
      hostEl.innerHTML = '';
      if (!previewBlobUrl) throw new Error('PDFデータがありません');
      const embed = document.createElement('embed');
      embed.type = 'application/pdf';
      embed.src = previewBlobUrl;
      embed.style.cssText = 'width:100%;height:100%;min-height:400px';
      hostEl.appendChild(embed);
      return Promise.resolve();
    }

    function updatePreview(item) {
      const title = document.getElementById('previewTitle');
      const empty = document.getElementById('previewEmpty');

      previewPayload = null;
      pdfBufferData = null;
      revokePreviewBlob_();
      clearPdfCanvas_();

      if (!item) {
        title.innerText = 'ファイルを選択してください';
        empty.style.display = 'block';
        empty.innerText = '一覧からファイル名をクリックするとここに表示されます';
        setPreviewButtonsEnabled_(false);
        return;
      }

      title.innerText = item.fileName;
      empty.style.display = 'block';
      empty.innerText = 'PDFを読み込み中...';
      setPreviewButtonsEnabled_(false);

      loadPdfViaChunks_(item.fileId, function(pct) {
        if (selectedItem && selectedItem.fileId === item.fileId) {
          empty.innerText = 'PDFを読み込み中... ' + pct + '%';
        }
      })
        .then(function(result) {
          if (!selectedItem || selectedItem.fileId !== item.fileId) return;
          if (!result) return;
          revokePreviewBlob_();
          const blob = new Blob([result.buffer], { type: result.meta.mimeType || 'application/pdf' });
          previewBlobUrl = URL.createObjectURL(blob);
          previewPayload = { fileName: result.meta.fileName || item.fileName, blob: blob };
          empty.style.display = 'none';
          return renderPdfFromArrayBuffer_(result.buffer);
        })
        .then(function() {
          if (!selectedItem || selectedItem.fileId !== item.fileId) return;
          setPreviewButtonsEnabled_(true);
        })
        .catch(function(err) {
          if (!selectedItem || selectedItem.fileId !== item.fileId) return;
          if (previewBlobUrl) {
            return renderPdfEmbedFallback_().then(function() {
              empty.style.display = 'none';
              setPreviewButtonsEnabled_(true);
            }).catch(function() {
              empty.style.display = 'block';
              empty.innerText = (err && err.message) ? err.message : 'プレビュー表示に失敗しました';
              setPreviewButtonsEnabled_(!!previewBlobUrl);
            });
          }
          empty.style.display = 'block';
          empty.innerText = (err && err.message) ? err.message : 'プレビューの読込に失敗しました';
          setPreviewButtonsEnabled_(false);
        });
    }

    function downloadPdfFromBlob_(blob, fileName) {
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = fileName || 'document.pdf';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(function() { URL.revokeObjectURL(link.href); }, 1000);
    }

    function downloadPdf() {
      if (!selectedItem) return;
      if (previewPayload && previewPayload.blob) {
        downloadPdfFromBlob_(previewPayload.blob, previewPayload.fileName || selectedItem.fileName);
        return;
      }
      const url = buildContentUrl(selectedItem, 'download');
      if (!url) return;
      window.open(url, '_blank');
    }

    function openPdfInNewTab() {
      if (!previewBlobUrl) return;
      window.open(previewBlobUrl, '_blank');
    }

    function printPdf() {
      if (!previewBlobUrl) return;
      const w = window.open(previewBlobUrl, '_blank');
      if (!w) {
        alert('ポップアップがブロックされました。ブラウザの設定を確認してください。');
        return;
      }
      w.addEventListener('load', function() {
        try { w.print(); } catch (e) { /* ブラウザ依存 */ }
      });
    }

    window.addEventListener('resize', function() {
      if (!pdfBufferData) return;
      clearTimeout(pdfResizeTimer);
      pdfResizeTimer = setTimeout(function() {
        rerenderPdfPreview_();
      }, 250);
    });

    function escapeHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
